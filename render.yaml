services:
  - type: web
    name: c8l-bot-server
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: HUGGINGFACE_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: PORT
        value: "8080"
      - key: RENDER_SERVICE_NAME
        value: "c8l-bot-server"
