version: '3.8'

services:
  # === NGINX — Reverse Proxy + Web Estatica + SSL ===
  nginx:
    image: nginx:alpine
    container_name: c8l-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./web-dist:/usr/share/nginx/html:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - bot
    restart: always
    networks:
      - c8l-network

  # === BOT — Telegram + WhatsApp + Health Check ===
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: c8l-bot
    expose:
      - "8080"
    volumes:
      - ./bot/data:/app/data
    environment:
      - PORT=8080
      - DATABASE_URL=postgresql://c8l:c8l_secure_2026@postgres:5432/c8l_agency
      - DOMAIN=c8lagency.com
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - c8l-network

  # === POSTGRESQL — Base de Datos Persistente ===
  postgres:
    image: postgres:16-alpine
    container_name: c8l-postgres
    environment:
      POSTGRES_USER: c8l
      POSTGRES_PASSWORD: c8l_secure_2026
      POSTGRES_DB: c8l_agency
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U c8l -d c8l_agency"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always
    networks:
      - c8l-network

  # === CERTBOT — SSL Automatico (Let's Encrypt) ===
  certbot:
    image: certbot/certbot
    container_name: c8l-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - c8l-network

volumes:
  postgres_data:
    driver: local

networks:
  c8l-network:
    driver: bridge
