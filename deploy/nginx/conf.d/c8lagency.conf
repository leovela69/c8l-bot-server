# HTTP server (inicial, sin SSL)
server {
    listen 80;
    server_name c8lagency.com www.c8lagency.com _;

    # Certbot challenge (para cuando actives SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Bot API + Health check + WhatsApp webhook
    location /webhook {
        proxy_pass http://bot:8080/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /api/ {
        proxy_pass http://bot:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check del bot
    location /health {
        proxy_pass http://bot:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Paginas generadas por Hefesto
    location /pages/ {
        proxy_pass http://bot:8080/pages/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Web estatica (Next.js export)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ $uri.html /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2|woff|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

