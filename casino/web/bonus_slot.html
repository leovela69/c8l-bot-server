<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BONUS ROUND — C8L LEGENDS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050505;
            background-image: url('assets/img/bg_main.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffd700;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* INTRO OVERLAY */
        #intro-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 9999;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease;
        }

        #intro-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        #intro-video {
            width: 80%;
            height: 80%;
            object-fit: contain;
            border-radius: 12px;
            clip-path: inset(0 0 8% 0);
        }

        /* MAIN LAYOUT */
        .main-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .main-container.visible {
            opacity: 1;
        }

        /* LION GUARDIANS */
        .lion-guardian {
            width: 15%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .lion-guardian video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            clip-path: inset(0 0 8% 0);
        }

        .lion-guardian::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to right, transparent 60%, #050505);
        }

        .lion-left::after {
            background: linear-gradient(to left, transparent 60%, #050505);
        }

        .lion-right::after {
            background: linear-gradient(to right, transparent 60%, #050505);
        }

        /* CENTER SECTION */
        .center-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            position: relative;
            background: rgba(5, 5, 5, 0.75);
        }

        /* HEADER */
        .header {
            text-align: center;
            margin-bottom: 12px;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .header h1 {
            font-size: 1.6rem;
            color: #ffd700;
            text-shadow: 0 0 15px #ffd700, 0 0 30px #ff8c00;
            margin-bottom: 8px;
        }

        .header .subtitle {
            font-size: 1rem;
            color: #fff;
            font-weight: bold;
            letter-spacing: 1px;
            background: rgba(0,0,0,0.5);
            padding: 6px 12px;
            border-radius: 6px;
            display: inline-block;
        }

        .header .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 8px;
        }

        .header .stat-box {
            text-align: center;
            background: rgba(255,215,0,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 8px;
            padding: 6px 14px;
            min-width: 80px;
        }

        .header .stat-box .stat-label {
            font-size: 0.65rem;
            color: #999;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .header .stat-box .stat-value {
            font-size: 1.2rem;
            color: #ffd700;
            font-weight: bold;
        }

        /* SLOT MACHINE WRAPPER */
        .slot-wrapper {
            position: relative;
            padding: 15px;
            border: 3px solid #ffd700;
            border-radius: 18px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4), inset 0 0 30px rgba(255, 215, 0, 0.1);
            animation: border-glow 3s ease-in-out infinite;
            background: rgba(0, 0, 0, 0.9);
        }

        @keyframes border-glow {
            0%, 100% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.4), inset 0 0 30px rgba(255, 215, 0, 0.1); }
            50% { box-shadow: 0 0 50px rgba(255, 215, 0, 0.7), inset 0 0 40px rgba(255, 215, 0, 0.2); }
        }

        /* REEL GRID */
        .reel-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 6px;
            position: relative;
            z-index: 5;
        }

        .reel-cell {
            width: 95px;
            height: 95px;
            border-radius: 10px;
            border: 2px solid #ffd700;
            overflow: hidden;
            position: relative;
            background: #0a0800;
        }

        /* Video dinámico (visible cuando PARADO) */
        .reel-cell video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0; left: 0;
            z-index: 2;
            transition: opacity 0.25s ease;
        }

        /* Strip de imágenes para animación de giro (visible cuando GIRANDO) */
        .reel-cell .reel-strip {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            z-index: 1;
            display: flex;
            flex-direction: column;
        }

        .reel-cell .reel-strip img {
            width: 100%;
            height: 95px;
            object-fit: cover;
            flex-shrink: 0;
        }

        /* Cuando gira: ocultar video, mostrar strip moviéndose */
        .reel-cell.spinning video {
            opacity: 0;
        }

        .reel-cell.stopped video {
            opacity: 1;
        }

        .reel-cell.winning {
            animation: win-flash 0.5s ease-in-out 3;
            box-shadow: 0 0 20px #ffd700, 0 0 40px #ff8c00;
            border-color: #fff;
        }

        @keyframes win-flash {
            0%, 100% { box-shadow: 0 0 20px #ffd700, 0 0 40px #ff8c00; }
            50% { box-shadow: 0 0 40px #fff, 0 0 80px #ffd700; }
        }

        /* BUTTON */
        .spin-btn {
            margin-top: 15px;
            width: 100%;
            max-width: 430px;
            height: 60px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #ffd700, #ff8c00, #ffd700);
            background-size: 200% 200%;
            animation: btn-gradient 3s ease infinite;
            color: #1a0a00;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.5);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .spin-btn:hover:not(:disabled) {
            transform: scale(1.03);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.7);
        }

        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .spin-btn.cobrar {
            background: linear-gradient(135deg, #00ff88, #00cc66, #00ff88);
            background-size: 200% 200%;
            animation: btn-gradient 2s ease infinite;
            color: #003300;
            font-size: 1.5rem;
        }

        @keyframes btn-gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* FOOTER */
        .footer {
            margin-top: 10px;
            text-align: center;
            z-index: 10;
        }

        .footer .total {
            font-size: 1.8rem;
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88;
            font-weight: bold;
        }

        .footer .result {
            font-size: 1.2rem;
            color: #ffcc00;
            margin-top: 5px;
            min-height: 30px;
        }

        /* SCREEN SHAKE */
        @keyframes screen-shake {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5px, -3px); }
            20% { transform: translate(5px, 3px); }
            30% { transform: translate(-3px, 5px); }
            40% { transform: translate(3px, -5px); }
            50% { transform: translate(-5px, 2px); }
            60% { transform: translate(5px, -2px); }
            70% { transform: translate(-2px, -5px); }
            80% { transform: translate(2px, 5px); }
            90% { transform: translate(-3px, -3px); }
        }

        body.shaking {
            animation: screen-shake 0.5s ease;
        }

        /* PARTICLES */
        .particle {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #ffd700;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            animation: particle-fly 1.5s ease-out forwards;
        }

        @keyframes particle-fly {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0); }
        }

        /* MEGA WIN OVERLAY */
        #mega-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 8000;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
        }

        #mega-overlay.active {
            display: flex;
        }

        #mega-overlay video {
            width: 60%;
            max-height: 80%;
            object-fit: contain;
            clip-path: inset(0 0 8% 0);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .lion-guardian {
                display: none;
            }

            .center-section {
                width: 100%;
            }

            .reel-cell {
                width: 60px;
                height: 60px;
            }

            .header h1 {
                font-size: 1.3rem;
            }

            .header .subtitle {
                font-size: 0.85rem;
            }

            .spin-btn {
                height: 50px;
                font-size: 1.1rem;
            }

            .footer .total {
                font-size: 1.4rem;
            }

            .slot-wrapper {
                padding: 10px;
            }

            .reel-grid {
                gap: 4px;
            }
        }

        @media (max-width: 480px) {
            .reel-cell {
                width: 50px;
                height: 50px;
            }

            .header h1 {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <!-- INTRO OVERLAY -->
    <div id="intro-overlay">
        <video id="intro-video" autoplay muted playsinline>
            <source src="assets/img/the-majestic-lion-charges-aggressively-towards-the.mp4" type="video/mp4">
        </video>
    </div>

    <!-- MEGA WIN OVERLAY -->
    <div id="mega-overlay">
        <video id="mega-video" muted playsinline>
            <source src="assets/img/the-majestic-lion-charges-aggressively-towards-the.mp4" type="video/mp4">
        </video>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="main-container" id="main-container">
        <!-- LEFT LION -->
        <div class="lion-guardian lion-left">
            <video autoplay muted loop playsinline preload="auto">
                <source src="assets/video/leon_sin_1.mp4" type="video/mp4">
            </video>
        </div>

        <!-- CENTER -->
        <div class="center-section">
            <div class="header">
                <h1>BONUS ROUND — C8L LEGENDS</h1>
                <div class="stats">
                    <div class="stat-box"><div class="stat-label">GIROS</div><div class="stat-value" id="stat-spins">15/15</div></div>
                    <div class="stat-box"><div class="stat-label">MULTI</div><div class="stat-value" id="stat-mult">x3</div></div>
                    <div class="stat-box"><div class="stat-label">ACUMULADO</div><div class="stat-value" id="stat-acum">0</div></div>
                </div>
            </div>

            <div class="slot-wrapper">
                <div class="reel-grid" id="reel-grid">
                    <!-- 15 cells generated by JS -->
                </div>
            </div>

            <button class="spin-btn" id="spin-btn" onclick="spin()">GIRAR BONUS (15 restantes)</button>

            <div class="footer">
                <div class="result" id="result-text"></div>
                <div class="total" id="total-text">ACUMULADO TOTAL: +0</div>
            </div>
        </div>

        <!-- RIGHT LION -->
        <div class="lion-guardian lion-right">
            <video autoplay muted loop playsinline preload="auto">
                <source src="assets/video/leon_sin_2.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <script>
        // ========== URL PARAMETERS ==========
        const urlParams = new URLSearchParams(window.location.search);
        let totalSpins = parseInt(urlParams.get('spins')) || 15;
        let multiplier = parseInt(urlParams.get('mult')) || 3;
        let bet = parseInt(urlParams.get('bet')) || 5000;
        let spinsLeft = totalSpins;
        let accumulated = 0;
        let isSpinning = false;

        // ========== SYMBOLS CONFIG (video dinámico + imagen estática) ==========
        const symbols = [
            { id: 'leon', video: 'assets/video/leo_din.mp4', img: 'assets/img/sym_leon.png', weight: 3 },
            { id: 'wild', video: 'assets/video/wild_din.mp4', img: 'assets/img/sym_wild.png', weight: 2 },
            { id: 'scatter', video: 'assets/video/scatter_din.mp4', img: 'assets/img/sym_scatter.png', weight: 4 },
            { id: 'a', video: 'assets/video/a_din.mp4', img: 'assets/img/sym_A.png', weight: 5 },
            { id: 'k', video: 'assets/video/k_din.mp4', img: 'assets/img/sym_K.jpeg', weight: 6 },
            { id: 'q', video: 'assets/video/q_din.mp4', img: 'assets/img/sym_Q.jpeg', weight: 7 },
            { id: 'j', video: 'assets/video/j_din.mp4', img: 'assets/img/sym_J.jpeg', weight: 8 },
            { id: '10', video: 'assets/video/10_din.mp4', img: 'assets/img/sym_10.jpeg', weight: 9 }
        ];

        const weightedPool = [];
        symbols.forEach(s => { for (let i = 0; i < s.weight; i++) weightedPool.push(s); });
        function getRandomSymbol() { return weightedPool[Math.floor(Math.random() * weightedPool.length)]; }

        // ========== WEB AUDIO API ==========
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playTone(freq, duration, type = 'square', volume = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playSpin() {
            initAudio();
            for (let i = 0; i < 5; i++) {
                setTimeout(() => playTone(200 + i * 50, 0.1, 'sawtooth', 0.05), i * 60);
            }
        }

        function playStop(col) {
            initAudio();
            playTone(400 + col * 100, 0.15, 'sine', 0.08);
        }

        function playWin() {
            initAudio();
            const notes = [523, 659, 784, 1047];
            notes.forEach((n, i) => {
                setTimeout(() => playTone(n, 0.3, 'sine', 0.1), i * 120);
            });
        }

        function playMegaWin() {
            initAudio();
            const notes = [523, 659, 784, 1047, 1318, 1568];
            notes.forEach((n, i) => {
                setTimeout(() => playTone(n, 0.4, 'sine', 0.15), i * 100);
            });
        }

        // ========== GRID + REEL ANIMATION ENGINE ==========
        const CELL_H = 95;
        const STRIP_LEN = 10;
        const grid = document.getElementById('reel-grid');
        const cells = [];
        const cellSymbols = [];
        const reelStrips = [];
        const colState = [];
        let animFrameId = null;
        let lastTime = 0;

        function initGrid() {
            grid.innerHTML = '';
            for (let col = 0; col < 5; col++) {
                colState.push({ spinning: false, speed: 0, offset: 0, stopped: true });
            }
            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 5; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'reel-cell stopped';
                    cell.dataset.row = row;
                    cell.dataset.col = col;

                    const sym = getRandomSymbol();
                    const video = document.createElement('video');
                    video.src = sym.video;
                    video.autoplay = true;
                    video.muted = true;
                    video.loop = true;
                    video.playsInline = true;
                    video.preload = 'auto';
                    video.setAttribute('playsinline', '');
                    cell.appendChild(video);

                    const strip = document.createElement('div');
                    strip.className = 'reel-strip';
                    for (let s = 0; s < STRIP_LEN; s++) {
                        const img = document.createElement('img');
                        img.src = getRandomSymbol().img;
                        img.draggable = false;
                        strip.appendChild(img);
                    }
                    cell.appendChild(strip);

                    grid.appendChild(cell);
                    cells.push(cell);
                    cellSymbols.push(sym);
                    reelStrips.push(strip);
                }
            }
        }

        function animLoop(ts) {
            if (!lastTime) lastTime = ts;
            const dt = Math.min((ts - lastTime) / 16.67, 3);
            lastTime = ts;
            let any = false;

            for (let col = 0; col < 5; col++) {
                const cs = colState[col];
                if (!cs.spinning && cs.stopped) continue;
                any = true;
                cs.offset += cs.speed * dt;
                if (cs.offset >= CELL_H) {
                    cs.offset -= CELL_H;
                }
                for (let row = 0; row < 3; row++) {
                    const idx = row * 5 + col;
                    reelStrips[idx].style.transform = 'translateY(' + (-cs.offset) + 'px)';
                }
            }
            if (any) { animFrameId = requestAnimationFrame(animLoop); }
            else { animFrameId = null; lastTime = 0; }
        }

        function startAnim() {
            if (!animFrameId) { lastTime = 0; animFrameId = requestAnimationFrame(animLoop); }
        }

        // ========== SPIN LOGIC — Mismo sistema que máquina 1 ==========
        // PAYLINES: SOLO las 3 filas horizontales (lo que el jugador VE)
        const PAYLINES = [
            [0,0,0,0,0],  // fila superior
            [1,1,1,1,1],  // fila central
            [2,2,2,2,2]   // fila inferior
        ];

        // Tabla de pagos bonus (más generosa que la principal)
        const BONUS_PAYTABLE = {
            '10':  0.08,   // 8% apuesta
            'j':   0.12,   // 12%
            'q':   0.15,   // 15%
            'k':   0.20,   // 20%
            'a':   0.25,   // 25%
            'leon': 5,     // x5 apuesta (premium)
            'wild': 10,    // x10 apuesta
            'scatter': 0
        };
        const WILD_PENALTY = 0.6;

        // Grid interno [col][row]
        let spinGrid = [];

        function spin() {
            if (isSpinning || spinsLeft <= 0) return;
            initAudio();
            isSpinning = true;
            spinsLeft--;

            const btn = document.getElementById('spin-btn');
            btn.disabled = true;
            document.getElementById('result-text').textContent = '';

            cells.forEach(cell => {
                cell.classList.add('spinning');
                cell.classList.remove('stopped', 'winning');
            });
            playSpin();

            // === GENERAR GRID Y FORZAR RESULTADO ANTES DE GIRAR ===
            spinGrid = [];
            for (let c = 0; c < 5; c++) {
                const col = [];
                for (let r = 0; r < 3; r++) col.push(getRandomSymbol());
                spinGrid.push(col);
            }

            // Bonus es MUY generoso (gratis): 85% gana algo
            const roll = Math.random();
            if (roll < 0.50) {
                // 50%: forzar 5 comunes en una fila horizontal random
                const commonSyms = symbols.filter(s => s.id !== 'scatter' && s.id !== 'wild' && s.id !== 'leon');
                const sym = commonSyms[Math.floor(Math.random() * commonSyms.length)];
                const row = Math.floor(Math.random() * 3); // fila 0, 1 o 2
                for (let c = 0; c < 5; c++) spinGrid[c][row] = sym;
                // 30% chance de wild en 1 posición
                if (Math.random() < 0.30) {
                    const wPos = Math.floor(Math.random() * 5);
                    spinGrid[wPos][row] = symbols.find(s => s.id === 'wild');
                }
            } else if (roll < 0.70) {
                // 20%: forzar 5 premium (león) en fila central
                const leonSym = symbols.find(s => s.id === 'leon');
                for (let c = 0; c < 5; c++) spinGrid[c][1] = leonSym;
                if (Math.random() < 0.40) {
                    spinGrid[Math.floor(Math.random() * 5)][1] = symbols.find(s => s.id === 'wild');
                }
            } else if (roll < 0.85) {
                // 15%: dos filas ganadoras (x2!)
                const commonSyms = symbols.filter(s => s.id !== 'scatter' && s.id !== 'wild' && s.id !== 'leon');
                const sym1 = commonSyms[Math.floor(Math.random() * commonSyms.length)];
                const sym2 = commonSyms[Math.floor(Math.random() * commonSyms.length)];
                for (let c = 0; c < 5; c++) { spinGrid[c][1] = sym1; spinGrid[c][0] = sym2; }
            }
            // 15%: sin premio — romper cualquier fila que tenga 5 iguales
            else {
                for (let row = 0; row < 3; row++) {
                    const first = spinGrid[0][row];
                    let count = 1;
                    for (let c = 1; c < 5; c++) {
                        if (spinGrid[c][row].id === first.id || spinGrid[c][row].id === 'wild') count++;
                        else break;
                    }
                    if (count >= 5) {
                        let diff = getRandomSymbol();
                        while (diff.id === first.id || diff.id === 'wild') diff = getRandomSymbol();
                        spinGrid[4][row] = diff;
                    }
                }
            }

            // Preparar strips con targets para transición suave
            for (let col = 0; col < 5; col++) {
                colState[col].spinning = true;
                colState[col].stopped = false;
                colState[col].speed = 0;
                colState[col].offset = 0;
                colState[col].target = spinGrid[col]; // guardar target
                for (let row = 0; row < 3; row++) {
                    const idx = row * 5 + col;
                    reelStrips[idx].style.transform = 'translateY(0)';
                    const imgs = reelStrips[idx].querySelectorAll('img');
                    imgs.forEach(img => { img.src = getRandomSymbol().img; });
                }
            }

            const accel = setInterval(() => {
                let done = true;
                for (let col = 0; col < 5; col++) {
                    if (colState[col].speed < 50) {
                        colState[col].speed = Math.min(colState[col].speed + 6, 50);
                        done = false;
                    }
                }
                if (done) clearInterval(accel);
            }, 40);
            startAnim();

            // Stop columns sequentially
            for (let col = 0; col < 5; col++) {
                setTimeout(() => {
                    stopCol(col);
                    playStop(col);
                    if (col === 4) setTimeout(() => finishSpin(), 350);
                }, 1100 + col * 260);
            }
        }

        function stopCol(col) {
            const cs = colState[col];
            // Antes de frenar: poner targets en las imágenes del strip
            for (let row = 0; row < 3; row++) {
                const idx = row * 5 + col;
                const imgs = reelStrips[idx].querySelectorAll('img');
                if (imgs[0] && cs.target && cs.target[row]) {
                    imgs[0].src = cs.target[row].img;
                }
            }
            const brake = () => {
                cs.speed *= 0.7;
                if (cs.speed < 1.5) {
                    cs.speed = 0;
                    cs.spinning = false;
                    cs.stopped = true;
                    for (let row = 0; row < 3; row++) {
                        const idx = row * 5 + col;
                        const cell = cells[idx];
                        const sym = spinGrid[col][row];
                        cellSymbols[idx] = sym;
                        cell.classList.remove('spinning');
                        cell.classList.add('stopped');
                        const video = cell.querySelector('video');
                        video.src = sym.video;
                        video.currentTime = 0;
                        video.play().catch(() => {});
                    }
                    return;
                }
                requestAnimationFrame(brake);
            };
            brake();
        }

        // === EVALUAR PAYLINES (solo 5 en línea, como máquina 1) ===
        function finishSpin() {
            isSpinning = false;
            let totalLineWin = 0;
            let linesWon = 0;
            let hasWild = false;

            for (let p = 0; p < PAYLINES.length; p++) {
                const pl = PAYLINES[p];
                const syms = [];
                for (let c = 0; c < 5; c++) syms.push(spinGrid[c][pl[c]]);

                let baseSym = null, wildCount = 0;
                for (const s of syms) {
                    if (s.id === 'wild') wildCount++;
                    else if (!baseSym) baseSym = s;
                }
                if (!baseSym || wildCount > 1) continue;

                let allMatch = true, usedWild = false;
                for (const s of syms) {
                    if (s.id === baseSym.id) continue;
                    if (s.id === 'wild' && !usedWild) { usedWild = true; continue; }
                    allMatch = false; break;
                }

                if (allMatch) {
                    linesWon++;
                    const payVal = BONUS_PAYTABLE[baseSym.id] || 0;
                    let win = 0;
                    if (payVal < 1) win = Math.round(bet * 20 * payVal); // porcentaje de apuesta total
                    else win = Math.round(bet * 20 * payVal); // multiplicador
                    if (usedWild) { win = Math.round(win * WILD_PENALTY); hasWild = true; }
                    totalLineWin += win;

                    // Highlight celdas ganadoras
                    for (let c = 0; c < 5; c++) {
                        const idx = pl[c] * 5 + c;
                        cells[idx].classList.add('winning');
                    }
                }
            }

            // Multi-línea
            let winAmount = totalLineWin;
            if (linesWon >= 3) winAmount = totalLineWin * 3;
            else if (linesWon >= 2) winAmount = totalLineWin * 2;

            // Aplicar multiplicador de bonus
            winAmount = Math.round(winAmount * multiplier);

            if (winAmount > 0) {
                accumulated += winAmount;
                document.body.classList.add('shaking');
                setTimeout(() => document.body.classList.remove('shaking'), 500);
                spawnParticles();

                const wildTxt = hasWild ? ' (comodín)' : '';
                const linesTxt = linesWon > 1 ? ` [${linesWon} líneas x${Math.min(linesWon, 3)}]` : '';

                if (linesWon >= 2 || winAmount >= bet * 20 * 3) {
                    playMegaWin();
                    showMegaOverlay();
                    document.getElementById('result-text').textContent = `🎉 +${winAmount.toLocaleString()}${wildTxt}${linesTxt} 🎉`;
                } else {
                    playWin();
                    document.getElementById('result-text').textContent = `✨ +${winAmount.toLocaleString()}${wildTxt} ✨`;
                }
            } else {
                document.getElementById('result-text').textContent = '— Sin coincidencias —';
            }

            updateUI();
        }

        function updateUI() {
            document.getElementById('stat-spins').textContent = spinsLeft + '/' + totalSpins;
            document.getElementById('stat-mult').textContent = 'x' + multiplier;
            document.getElementById('stat-acum').textContent = accumulated.toLocaleString();
            document.getElementById('total-text').textContent = `ACUMULADO TOTAL: +${accumulated.toLocaleString()}`;

            const btn = document.getElementById('spin-btn');
            if (spinsLeft <= 0) {
                btn.textContent = `COBRAR +${accumulated.toLocaleString()}`;
                btn.classList.add('cobrar');
                btn.disabled = false;
                btn.onclick = cobrar;
            } else {
                btn.textContent = `GIRAR BONUS (${spinsLeft} restantes)`;
                btn.disabled = false;
            }
        }

        function cobrar() {
            // Send result to parent window
            if (window.opener) {
                window.opener.postMessage({
                    type: 'bonus_result',
                    total: accumulated,
                    spins: totalSpins,
                    multiplier: multiplier
                }, '*');
            }

            // Also try parent frame
            if (window.parent !== window) {
                window.parent.postMessage({
                    type: 'bonus_result',
                    total: accumulated,
                    spins: totalSpins,
                    multiplier: multiplier
                }, '*');
            }

            // Show farewell message
            document.getElementById('result-text').textContent = `💰 ¡Cobraste ${accumulated.toLocaleString()}! Volviendo al juego...`;
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;
            btn.textContent = '✅ COBRADO';

            // Close or redirect after delay
            setTimeout(() => {
                if (window.opener) {
                    window.close();
                } else {
                    window.history.back();
                }
            }, 2000);
        }

        // ========== EFFECTS ==========
        function spawnParticles() {
            const count = 30;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const x = window.innerWidth / 2 + (Math.random() - 0.5) * 200;
                const y = window.innerHeight / 2 + (Math.random() - 0.5) * 100;
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.setProperty('--px', (Math.random() - 0.5) * 300 + 'px');
                p.style.setProperty('--py', (Math.random() - 0.5) * 300 + 'px');
                p.style.background = Math.random() > 0.5 ? '#ffd700' : '#ff8c00';
                p.style.width = (4 + Math.random() * 8) + 'px';
                p.style.height = p.style.width;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1500);
            }
        }

        function showMegaOverlay() {
            const overlay = document.getElementById('mega-overlay');
            const video = document.getElementById('mega-video');
            overlay.classList.add('active');
            video.currentTime = 0;
            video.play().catch(() => {});
            setTimeout(() => {
                overlay.classList.remove('active');
                video.pause();
            }, 2500);
        }

        // ========== INTRO SEQUENCE ==========
        function startIntro() {
            const overlay = document.getElementById('intro-overlay');
            const introVid = document.getElementById('intro-video');

            // Wait for video to play or timeout after 3s
            const reveal = () => {
                overlay.classList.add('fade-out');
                setTimeout(() => {
                    overlay.style.display = 'none';
                    document.getElementById('main-container').classList.add('visible');
                }, 1000);
            };

            introVid.play().catch(() => {
                // If video can't play, just reveal
                reveal();
            });

            // End after 3 seconds regardless
            setTimeout(reveal, 3000);

            introVid.addEventListener('ended', reveal, { once: true });
        }

        // ========== INIT ==========
        window.addEventListener('DOMContentLoaded', () => {
            initGrid();
            updateUI();
            startIntro();
        });
    </script>
</body>
</html>
