<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C8L PLINKO — Gravity Gold</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #06060f;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  color: #e0c97f;
  overflow-x: hidden;
}
#game-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px;
  width: 100%;
  max-width: 900px;
}
#hud {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  align-items: center;
  margin-bottom: 10px;
  width: 100%;
}
.hud-item {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border: 1px solid #d4a017;
  border-radius: 8px;
  padding: 8px 14px;
  text-align: center;
  min-width: 90px;
}
.hud-item label {
  font-size: 10px;
  color: #a08030;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.hud-item .value {
  font-size: 18px;
  font-weight: bold;
  color: #ffd700;
}
</style>
</head>
<body>
<div id="game-container">
<div id="hud">
</div>
<canvas id="plinko-canvas"></canvas>
<div id="history-bar"></div>
</div>

<script>
// ===== C8L PLINKO — Gravity Gold =====
const { Engine, World, Bodies, Body, Events, Runner } = Matter;

// --- Game State ---
let balance = 1000;
let betAmount = 25;
let numBalls = 1;
let riskLevel = 'MEDIUM';
let lastWin = 0;
let activeBalls = [];
let dropHistory = [];
let dropping = false;

// --- Risk Multipliers ---
const MULTIPLIERS = {
  LOW:    [0.5, 0.7, 1, 1.2, 1.5, 2, 2.5, 3, 2.5, 2, 1.5, 1.2, 1, 0.7, 0.5],
  MEDIUM: [0.2, 0.5, 1, 1.5, 2, 3, 5, 10, 5, 3, 2, 1.5, 1, 0.5, 0.2],
  HIGH:   [0, 0.2, 0.5, 1, 2, 5, 10, 50, 10, 5, 2, 1, 0.5, 0.2, 0]
};

const RESTITUTION = { LOW: 0.5, MEDIUM: 0.6, HIGH: 0.75 };

// --- Canvas Setup ---
const canvas = document.getElementById('plinko-canvas');
const ctx = canvas.getContext('2d');
const W = 700, H = 750;
canvas.width = W; canvas.height = H;
canvas.style.border = '3px solid #d4a017';
canvas.style.borderRadius = '12px';
canvas.style.cursor = 'pointer';

// --- Matter.js Engine ---
const engine = Engine.create();
engine.gravity.y = 1.2;
const world = engine.world;

// --- Board Constants ---
const PEG_RADIUS = 5;
const BALL_RADIUS = 9;
const BOARD_TOP = 60;
const BOARD_BOTTOM = H - 90;
const BOARD_LEFT = 70;
const BOARD_RIGHT = W - 70;
const ROWS = 12;
const SLOT_COUNT = 15;


// --- Peg positions ---
let pegs = [];
const rowSpacing = (BOARD_BOTTOM - BOARD_TOP - 80) / (ROWS - 1);

function createPegs() {
  pegs.forEach(p => World.remove(world, p.body));
  pegs = [];
  for (let row = 0; row < ROWS; row++) {
    const pegCount = 3 + row;
    const y = BOARD_TOP + 30 + row * rowSpacing;
    const totalWidth = BOARD_RIGHT - BOARD_LEFT;
    const spacing = totalWidth / (pegCount + 1);
    for (let col = 0; col < pegCount; col++) {
      const x = BOARD_LEFT + spacing * (col + 1);
      const body = Bodies.circle(x, y, PEG_RADIUS, {
        isStatic: true,
        restitution: RESTITUTION[riskLevel],
        friction: 0.1,
        label: 'peg'
      });
      World.add(world, body);
      pegs.push({ body, flashTimer: 0 });
    }
  }
}

// --- Slot dividers ---
let slotDividers = [];
let slotPositions = [];

function createSlots() {
  slotDividers.forEach(d => World.remove(world, d));
  slotDividers = [];
  slotPositions = [];
  const slotWidth = (BOARD_RIGHT - BOARD_LEFT) / SLOT_COUNT;
  const slotY = BOARD_BOTTOM - 20;
  const dividerHeight = 35;

  for (let i = 0; i <= SLOT_COUNT; i++) {
    const x = BOARD_LEFT + i * slotWidth;
    const body = Bodies.rectangle(x, slotY, 3, dividerHeight, {
      isStatic: true, label: 'divider', friction: 0.2, restitution: 0.3
    });
    World.add(world, body);
    slotDividers.push(body);
  }
  for (let i = 0; i < SLOT_COUNT; i++) {
    slotPositions.push(BOARD_LEFT + slotWidth * (i + 0.5));
  }

  // Floor
  const floor = Bodies.rectangle(W / 2, BOARD_BOTTOM + 5, W, 10, {
    isStatic: true, label: 'floor', friction: 0.8, restitution: 0.1
  });
  World.add(world, floor);

  // Walls
  const wallL = Bodies.rectangle(BOARD_LEFT - 10, H / 2, 10, H, { isStatic: true, label: 'wall' });
  const wallR = Bodies.rectangle(BOARD_RIGHT + 10, H / 2, 10, H, { isStatic: true, label: 'wall' });
  World.add(world, [wallL, wallR]);
}


// --- Audio Engine ---
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTick(pitch) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.value = 800 + pitch * 400;
  gain.gain.setValueAtTime(0.06, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.08);
}

function playWhoosh() {
  const ctx = getAudioCtx();
  const bufferSize = ctx.sampleRate * 0.15;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize) * 0.3;
  const src = ctx.createBufferSource();
  src.buffer = buffer;
  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass'; filter.frequency.value = 1200;
  src.connect(filter); filter.connect(ctx.destination);
  src.start();
}

function playDing(mult) {
  const ctx = getAudioCtx();
  const freq = 400 + Math.min(mult, 50) * 20;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'triangle';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.15, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.4);
}

function playCelebration() {
  const ctx = getAudioCtx();
  [523, 659, 784, 1047].forEach((f, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = f;
    gain.gain.setValueAtTime(0.1, ctx.currentTime + i * 0.1);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.3);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(ctx.currentTime + i * 0.1);
    osc.stop(ctx.currentTime + i * 0.1 + 0.3);
  });
}

function playFanfare() {
  const ctx = getAudioCtx();
  [392, 523, 659, 784, 1047, 1319].forEach((f, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.value = f;
    gain.gain.setValueAtTime(0.07, ctx.currentTime + i * 0.08);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.08 + 0.5);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(ctx.currentTime + i * 0.08);
    osc.stop(ctx.currentTime + i * 0.08 + 0.5);
  });
}


// --- Ball Management ---
let trails = []; // {x, y, alpha, color}
let slotFlash = []; // {index, timer, mult}
let particles = []; // {x, y, vx, vy, life, color}

function dropBall(x) {
  const offset = (Math.random() - 0.5) * 20;
  const ball = Bodies.circle(x + offset, BOARD_TOP - 10, BALL_RADIUS, {
    restitution: 0.5,
    friction: 0.05,
    density: 0.002,
    label: 'ball'
  });
  Body.setAngularVelocity(ball, (Math.random() - 0.5) * 0.1);
  World.add(world, ball);
  activeBalls.push({ body: ball, landed: false, trail: [], spawnTime: Date.now() });
  playWhoosh();
}

function dropAllBalls(clickX) {
  const totalBet = betAmount * numBalls;
  if (balance < totalBet) return;
  balance -= totalBet;
  dropping = true;
  lastWin = 0;

  for (let i = 0; i < numBalls; i++) {
    setTimeout(() => {
      const spread = numBalls > 1 ? (i - (numBalls - 1) / 2) * 15 : 0;
      dropBall(clickX + spread);
    }, i * 80);
  }
  updateHUD();
}

function getSlotIndex(x) {
  const slotWidth = (BOARD_RIGHT - BOARD_LEFT) / SLOT_COUNT;
  let idx = Math.floor((x - BOARD_LEFT) / slotWidth);
  return Math.max(0, Math.min(SLOT_COUNT - 1, idx));
}

function resolveBall(ballObj) {
  const idx = getSlotIndex(ballObj.body.position.x);
  const mults = MULTIPLIERS[riskLevel];
  const mult = mults[idx];
  const win = Math.round(betAmount * mult * 10) / 10;
  balance += win;
  lastWin += win;
  ballObj.landed = true;

  // Slot flash
  slotFlash.push({ index: idx, timer: 60, mult });

  // History
  dropHistory.unshift({ mult, color: getMultColor(mult) });
  if (dropHistory.length > 10) dropHistory.pop();

  // Sound
  playDing(mult);
  if (mult >= 10) playFanfare();
  else if (mult >= 5) playCelebration();

  // Particles for high wins
  if (mult >= 5) {
    for (let i = 0; i < 20; i++) {
      particles.push({
        x: slotPositions[idx], y: BOARD_BOTTOM - 30,
        vx: (Math.random() - 0.5) * 6, vy: -Math.random() * 8 - 2,
        life: 60, color: mult >= 10 ? '#ff4444' : '#ffd700'
      });
    }
  }

  // Remove ball after delay
  setTimeout(() => {
    World.remove(world, ballObj.body);
    activeBalls = activeBalls.filter(b => b !== ballObj);
    if (activeBalls.length === 0) {
      dropping = false;
      updateHUD();
    }
  }, 500);

  updateHUD();
}

function getMultColor(m) {
  if (m >= 10) return '#ff2222';
  if (m >= 5) return '#ff8800';
  if (m >= 3) return '#ffcc00';
  if (m >= 2) return '#ffd700';
  if (m >= 1) return '#88cc44';
  return '#44aa88';
}


// --- Collision Detection ---
Events.on(engine, 'collisionStart', (event) => {
  event.pairs.forEach(pair => {
    const labels = [pair.bodyA.label, pair.bodyB.label];
    if (labels.includes('ball') && labels.includes('peg')) {
      const pegBody = pair.bodyA.label === 'peg' ? pair.bodyA : pair.bodyB;
      const peg = pegs.find(p => p.body === pegBody);
      if (peg) peg.flashTimer = 10;
      playTick(Math.random());
    }
    if (labels.includes('ball') && labels.includes('floor')) {
      const ballBody = pair.bodyA.label === 'ball' ? pair.bodyA : pair.bodyB;
      const ballObj = activeBalls.find(b => b.body === ballBody);
      if (ballObj && !ballObj.landed) resolveBall(ballObj);
    }
  });
});

// --- HUD ---
function buildHUD() {
  const hud = document.getElementById('hud');
  hud.innerHTML = `
    <div class="hud-item"><label>Balance</label><div class="value" id="hud-balance">${balance}</div></div>
    <div class="hud-item"><label>Bet</label><div class="value">
      <select id="sel-bet" style="background:#1a1a2e;color:#ffd700;border:1px solid #d4a017;border-radius:4px;font-size:14px;padding:2px 6px;">
        <option value="10">10</option><option value="25" selected>25</option><option value="50">50</option>
        <option value="100">100</option><option value="250">250</option>
      </select>
    </div></div>
    <div class="hud-item"><label>Balls</label><div class="value">
      <select id="sel-balls" style="background:#1a1a2e;color:#ffd700;border:1px solid #d4a017;border-radius:4px;font-size:14px;padding:2px 6px;">
        <option value="1" selected>1</option><option value="3">3</option><option value="5">5</option><option value="10">10</option>
      </select>
    </div></div>
    <div class="hud-item"><label>Risk</label><div class="value">
      <select id="sel-risk" style="background:#1a1a2e;color:#ffd700;border:1px solid #d4a017;border-radius:4px;font-size:14px;padding:2px 6px;">
        <option value="LOW">Low</option><option value="MEDIUM" selected>Med</option><option value="HIGH">High</option>
      </select>
    </div></div>
    <div class="hud-item"><label>Last Win</label><div class="value" id="hud-lastwin">0</div></div>
    <button id="btn-drop" style="background:linear-gradient(135deg,#d4a017,#b8860b);color:#06060f;font-size:18px;font-weight:bold;
      border:none;border-radius:10px;padding:12px 30px;cursor:pointer;text-transform:uppercase;letter-spacing:2px;
      box-shadow:0 0 15px rgba(212,160,23,0.5);">⬇ DROP</button>
  `;

  document.getElementById('sel-bet').addEventListener('change', e => { betAmount = parseInt(e.target.value); });
  document.getElementById('sel-balls').addEventListener('change', e => { numBalls = parseInt(e.target.value); });
  document.getElementById('sel-risk').addEventListener('change', e => {
    riskLevel = e.target.value;
    createPegs();
  });
  document.getElementById('btn-drop').addEventListener('click', () => {
    if (!dropping) dropAllBalls(W / 2);
  });
}

function updateHUD() {
  const b = document.getElementById('hud-balance');
  const lw = document.getElementById('hud-lastwin');
  if (b) b.textContent = Math.round(balance);
  if (lw) lw.textContent = Math.round(lastWin * 10) / 10;
  updateHistory();
}

function updateHistory() {
  const bar = document.getElementById('history-bar');
  bar.style.cssText = 'display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;justify-content:center;';
  bar.innerHTML = dropHistory.map(h =>
    `<span style="background:${h.color}22;border:1px solid ${h.color};color:${h.color};
      padding:3px 8px;border-radius:6px;font-size:12px;font-weight:bold;">${h.mult}x</span>`
  ).join('');
}


// --- Canvas Click to Drop ---
canvas.addEventListener('click', (e) => {
  if (dropping) return;
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (W / rect.width);
  const y = (e.clientY - rect.top) * (H / rect.height);
  if (y < BOARD_TOP + 50) {
    const clampedX = Math.max(BOARD_LEFT + 30, Math.min(BOARD_RIGHT - 30, x));
    dropAllBalls(clampedX);
  }
});

// --- Rendering ---
function drawFrame() {
  // Gold ornate frame
  ctx.strokeStyle = '#d4a017';
  ctx.lineWidth = 4;
  ctx.shadowColor = '#d4a017';
  ctx.shadowBlur = 12;
  ctx.strokeRect(8, 8, W - 16, H - 16);
  ctx.shadowBlur = 0;

  // Inner frame
  ctx.strokeStyle = '#8b6914';
  ctx.lineWidth = 1;
  ctx.strokeRect(14, 14, W - 28, H - 28);

  // Corner ornaments
  const corners = [[20, 20], [W - 20, 20], [20, H - 20], [W - 20, H - 20]];
  corners.forEach(([cx, cy]) => {
    ctx.beginPath();
    ctx.arc(cx, cy, 6, 0, Math.PI * 2);
    ctx.fillStyle = '#d4a017';
    ctx.fill();
  });
}

function drawPegs() {
  pegs.forEach(peg => {
    const { x, y } = peg.body.position;
    ctx.beginPath();
    ctx.arc(x, y, PEG_RADIUS, 0, Math.PI * 2);

    if (peg.flashTimer > 0) {
      ctx.fillStyle = '#ffffff';
      ctx.shadowColor = '#ffffff';
      ctx.shadowBlur = 10;
      peg.flashTimer--;
    } else {
      ctx.fillStyle = '#d4a017';
      ctx.shadowColor = '#d4a017';
      ctx.shadowBlur = 4;
    }
    ctx.fill();
    ctx.shadowBlur = 0;
  });
}

function drawBalls() {
  activeBalls.forEach(ballObj => {
    const { x, y } = ballObj.body.position;

    // Trail
    ballObj.trail.push({ x, y, alpha: 1 });
    if (ballObj.trail.length > 12) ballObj.trail.shift();

    ballObj.trail.forEach((t, i) => {
      t.alpha -= 0.08;
      if (t.alpha > 0) {
        ctx.beginPath();
        ctx.arc(t.x, t.y, BALL_RADIUS * (i / ballObj.trail.length) * 0.7, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 180, 0, ${t.alpha * 0.4})`;
        ctx.fill();
      }
    });

    // Ball body
    const gradient = ctx.createRadialGradient(x - 3, y - 3, 1, x, y, BALL_RADIUS);
    gradient.addColorStop(0, '#fff8dc');
    gradient.addColorStop(0.4, '#ffd700');
    gradient.addColorStop(1, '#cc7700');
    ctx.beginPath();
    ctx.arc(x, y, BALL_RADIUS, 0, Math.PI * 2);
    ctx.fillStyle = gradient;
    ctx.shadowColor = '#ffa500';
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.shadowBlur = 0;
  });
}


function drawSlots() {
  const mults = MULTIPLIERS[riskLevel];
  const slotWidth = (BOARD_RIGHT - BOARD_LEFT) / SLOT_COUNT;

  // Dividers
  slotDividers.forEach(d => {
    const { x, y } = d.position;
    ctx.fillStyle = '#d4a01788';
    ctx.fillRect(x - 1.5, y - 17, 3, 35);
  });

  // Multiplier labels
  mults.forEach((m, i) => {
    const x = slotPositions[i];
    const y = BOARD_BOTTOM + 15;
    const color = getMultColor(m);

    // Slot flash
    const flash = slotFlash.find(f => f.index === i);
    if (flash) {
      ctx.fillStyle = color + '33';
      ctx.fillRect(x - slotWidth / 2, BOARD_BOTTOM - 37, slotWidth, 37);
      ctx.shadowColor = color;
      ctx.shadowBlur = 15;
      flash.timer--;
      if (flash.timer <= 0) slotFlash = slotFlash.filter(f => f !== flash);
    }

    // Label glow
    ctx.shadowColor = color;
    ctx.shadowBlur = m >= 5 ? 8 : 3;
    ctx.fillStyle = color;
    ctx.font = m >= 10 ? 'bold 13px sans-serif' : '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(m + 'x', x, y);
    ctx.shadowBlur = 0;
  });
}

function drawParticles() {
  particles.forEach((p, i) => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.2;
    p.life--;
    if (p.life <= 0) { particles.splice(i, 1); return; }
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3 * (p.life / 60), 0, Math.PI * 2);
    ctx.fillStyle = p.color + Math.floor(p.life / 60 * 255).toString(16).padStart(2, '0');
    ctx.fill();
  });
}

function drawDropZone() {
  // Drop zone indicator at top
  ctx.fillStyle = '#d4a01722';
  ctx.fillRect(BOARD_LEFT, 20, BOARD_RIGHT - BOARD_LEFT, 35);
  ctx.strokeStyle = '#d4a01755';
  ctx.setLineDash([5, 5]);
  ctx.strokeRect(BOARD_LEFT, 20, BOARD_RIGHT - BOARD_LEFT, 35);
  ctx.setLineDash([]);
  ctx.fillStyle = '#d4a01788';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('↓ CLICK HERE TO DROP ↓', W / 2, 42);
}

function drawTitle() {
  ctx.font = 'bold 16px sans-serif';
  ctx.fillStyle = '#d4a017';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#d4a017';
  ctx.shadowBlur = 6;
  ctx.fillText('C8L PLINKO — GRAVITY GOLD', W / 2, 16);
  ctx.shadowBlur = 0;
}


// --- Main Loop ---
function render() {
  Engine.update(engine, 1000 / 60);

  // Check if balls fell too far (safety)
  activeBalls.forEach(ballObj => {
    if (!ballObj.landed && ballObj.body.position.y > H + 50) {
      resolveBall(ballObj);
    }
  });

  // Clear
  ctx.fillStyle = '#06060f';
  ctx.fillRect(0, 0, W, H);

  // Ambient glow
  const ambGrad = ctx.createRadialGradient(W / 2, H / 2, 100, W / 2, H / 2, 400);
  ambGrad.addColorStop(0, 'rgba(212,160,23,0.03)');
  ambGrad.addColorStop(1, 'rgba(6,6,15,0)');
  ctx.fillStyle = ambGrad;
  ctx.fillRect(0, 0, W, H);

  drawTitle();
  drawFrame();
  drawDropZone();
  drawPegs();
  drawSlots();
  drawBalls();
  drawParticles();

  requestAnimationFrame(render);
}

// --- Init ---
function init() {
  createPegs();
  createSlots();
  buildHUD();
  updateHUD();
  render();
}

init();
</script>
</body>
</html>
