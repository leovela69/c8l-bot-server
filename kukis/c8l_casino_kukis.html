    function getLabel(id){return{crash:'🚀 CASH OUT',mines:'💎 DESTAPAR',plinko:'🟡 SOLTAR',ruleta:'🎡 GIRAR',slot:'❤️ GIRAR'}[id]||'🎲 JUGAR'}

    // === PLAY GAME (Non-Kukis) ===
    function playGame(){
        if(!STATE.currentGame||STATE.spinning)return;
        if(STATE.balance<STATE.bet){toast('❌ Saldo insuficiente');sfx.lose();return}
        sfx.init();STATE.spinning=true;
        const btn=document.getElementById('btnMain');if(btn)btn.disabled=true;
        updateBal(-STATE.bet);addWager(STATE.bet);
        const wb=document.getElementById('winBanner');if(wb){wb.textContent='';wb.classList.remove('show')}
        sfx.spin();
        const id=STATE.currentGame.id;
        animateGame(id);
        setTimeout(()=>{
            const win=calcWin(STATE.currentGame);
            if(win>0){
                updateBal(win);
                const wb2=document.getElementById('winBanner');
                if(wb2){wb2.textContent=`¡GANASTE ${win.toLocaleString()} chips! 🎉`;wb2.classList.add('show')}
                if(win>=STATE.bet*8){sfx.jackpot();toast(`💥 JACKPOT x${(win/STATE.bet).toFixed(1)}!`)}else{sfx.win()}
                const cv=document.getElementById('gameCanvas');if(cv)spawnWinParticles(cv,cv.getContext('2d'),cv.width/2,cv.height/2,70);
            } else {
                const wb2=document.getElementById('winBanner');if(wb2){wb2.textContent='🔄 Inténtalo de nuevo';wb2.classList.remove('show')}
                sfx.lose();
            }
            STATE.spinning=false;if(btn)btn.disabled=false;
            drawGame(id);
        },1500);
    }

    function calcWin(game){
        const r=Math.random(),rtp=game.rtp;
        if(r<rtp*.30)return Math.floor(STATE.bet*(1+Math.random()*2.2));
        if(r<rtp*.13)return Math.floor(STATE.bet*(3+Math.random()*7));
        if(r<rtp*.025)return Math.floor(STATE.bet*(10+Math.random()*45));
        return 0;
    }

    // === DRAW GAMES ON CANVAS ===
    function drawGame(id){
        const cv=document.getElementById('gameCanvas');if(!cv)return;
        const ctx=cv.getContext('2d');ctx.clearRect(0,0,cv.width,cv.height);
        ctx.fillStyle='#0a0a18';ctx.fillRect(0,0,cv.width,cv.height);
        switch(id){
            case 'crash':drawCrash(ctx,cv);break;
            case 'mines':drawMines(ctx,cv);break;
            case 'plinko':drawPlinko(ctx,cv);break;
            case 'ruleta':drawRuleta(ctx,cv);break;
            case 'slot':drawSlot(ctx,cv);break;
        }
    }

    function animateGame(id){
        const cv=document.getElementById('gameCanvas');if(!cv)return;
        const ctx=cv.getContext('2d');let f=0;
        function anim(){if(f>=25)return;ctx.fillStyle=`rgba(244,180,26,${.3-f/25*.3})`;ctx.fillRect(0,0,cv.width,cv.height);f++;requestAnimationFrame(anim)}anim()
    }

    // --- CRASH ---
    function drawCrash(ctx,cv){
        const cx=cv.width/2,cy=cv.height/2;
        // Grid
        ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=1;
        for(let i=0;i<10;i++){ctx.beginPath();ctx.moveTo(60+i*70,cv.height-60);ctx.lineTo(60+i*70,40);ctx.stroke();ctx.beginPath();ctx.moveTo(60,40+i*42);ctx.lineTo(cv.width-40,40+i*42);ctx.stroke()}
        // Curve
        const grd=ctx.createLinearGradient(60,cv.height-60,cv.width-60,60);grd.addColorStop(0,'#ef4444');grd.addColorStop(.5,'#f4b41a');grd.addColorStop(1,'#10b981');
        ctx.strokeStyle=grd;ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(60,cv.height-60);
        const mult=1+Math.random()*4;
        for(let x=0;x<cv.width-120;x+=5){const y=(cv.height-60)-(x/(cv.width-120))*(cv.height-120)*Math.pow(x/(cv.width-120),.7);ctx.lineTo(60+x,y)}
        ctx.stroke();
        // Multiplier
        const m=(1+Math.random()*3.5).toFixed(2);
        ctx.fillStyle='#f4b41a';ctx.font='bold 65px Arial';ctx.textAlign='center';ctx.fillText(m+'x',cx,cy-50);
        ctx.fillStyle='#fff';ctx.font='18px Arial';ctx.fillText('Retira antes de que explote',cx,cy+10);
        // Rocket
        ctx.font='40px Arial';ctx.fillText('🚀',cv.width-100,80);
    }

    // --- MINES ---
    function drawMines(ctx,cv){
        const sz=5,cell=72,offX=(cv.width-sz*cell)/2,offY=(cv.height-sz*cell)/2;
        for(let r=0;r<sz;r++)for(let c=0;c<sz;c++){
            ctx.fillStyle='#141428';ctx.strokeStyle='#f4b41a';ctx.lineWidth=2;
            roundRect(ctx,offX+c*cell+4,offY+r*cell+4,cell-8,cell-8,10);ctx.fill();ctx.stroke();
            if(Math.random()<.35){ctx.font='32px Arial';ctx.textAlign='center';ctx.fillText(Math.random()<.75?'💎':'💣',offX+c*cell+cell/2,offY+r*cell+cell/2+10)}
        }
        ctx.fillStyle='#f4b41a';ctx.font='bold 20px Arial';ctx.textAlign='center';ctx.fillText('Encuentra 💎 Evita 💣',cv.width/2,30);
    }

    // --- PLINKO ---
    function drawPlinko(ctx,cv){
        for(let row=0;row<9;row++){const pegs=row+3;for(let p=0;p<pegs;p++){const x=cv.width/2-(pegs-1)*35+p*70,y=60+row*42;ctx.fillStyle='#f4b41a';ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill()}}
        const mults=['0.2x','0.5x','1x','2x','5x','10x','5x','2x','1x','0.5x','0.2x'];
        mults.forEach((m,i)=>{ctx.fillStyle=i===5?'#ef4444':i>=3&&i<=7?'#f4b41a':'#10b981';ctx.font='bold 14px Arial';ctx.textAlign='center';ctx.fillText(m,65+i*58,cv.height-20)});
        // Ball
        ctx.fillStyle='#ff6b35';ctx.beginPath();ctx.arc(cv.width/2+Math.random()*40-20,50+Math.random()*200,10,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cv.width/2+Math.random()*40-20,50+Math.random()*200,4,0,Math.PI*2);ctx.fill();
    }

    // --- RULETA ---
    function drawRuleta(ctx,cv){
        const cx=cv.width/2,cy=cv.height/2+10;
        for(let i=0;i<37;i++){ctx.fillStyle=i===0?'#10b981':i%2===0?'#e74c3c':'#1a1a2e';ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,190,(i*Math.PI/18.5),((i+1)*Math.PI/18.5));ctx.closePath();ctx.fill();ctx.strokeStyle='#f4b41a';ctx.lineWidth=1;ctx.stroke()}
        ctx.fillStyle='#141428';ctx.beginPath();ctx.arc(cx,cy,50,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='#f4b41a';ctx.lineWidth=3;ctx.beginPath();ctx.arc(cx,cy,50,0,Math.PI*2);ctx.stroke();
        ctx.fillStyle='#f4b41a';ctx.font='bold 24px Arial';ctx.textAlign='center';ctx.fillText('C8L',cx,cy+8);
        // Arrow
        ctx.fillStyle='#f4b41a';ctx.beginPath();ctx.moveTo(cx,cy-185);ctx.lineTo(cx-12,cy-210);ctx.lineTo(cx+12,cy-210);ctx.closePath();ctx.fill();
    }

    // --- SLOT ---
    function drawSlot(ctx,cv){
        const syms=['❤️','💎','🦁','⭐','7️⃣','🍒','👑'],reels=5,rw=cv.width/(reels+1);
        for(let i=0;i<reels;i++){
            const x=rw*(i+.5);ctx.fillStyle='#141428';ctx.strokeStyle='#ec4899';ctx.lineWidth=3;
            roundRect(ctx,x-rw*.38,70,rw*.76,310,14);ctx.fill();ctx.stroke();
            for(let j=0;j<3;j++){ctx.font='44px Arial';ctx.textAlign='center';ctx.fillText(syms[Math.floor(Math.random()*syms.length)],x,160+j*95)}
        }
        ctx.strokeStyle='#f4b41a';ctx.lineWidth=3;ctx.setLineDash([8,8]);ctx.beginPath();ctx.moveTo(40,240);ctx.lineTo(cv.width-40,240);ctx.stroke();ctx.setLineDash([]);
        ctx.fillStyle='#f4b41a';ctx.font='bold 18px Arial';ctx.textAlign='center';ctx.fillText('CORAZONES LOCOS',cv.width/2,40);
    }

    // roundRect helper
    function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}

        if(KS.selectedIdx<0)return;
        if(KS.clues[slotIdx]){toast('⚠️ Slot ocupado. Haz clic para quitar.');return}
        if(KS.clues.filter(Boolean).length>=3){toast('⚠️ Ya tienes 3 pistas');return}
        sfx.click();
        const card=KS.hand[KS.selectedIdx];
        KS.clues[slotIdx]=card;
        KS.hand.splice(KS.selectedIdx,1);
        KS.selectedIdx=-1;
        kukisRenderHand();kukisRenderSlots();
    }

    function removeClue(slotIdx){
        if(!KS.clues[slotIdx])return;
        sfx.click();
        KS.hand.push(KS.clues[slotIdx]);
        KS.clues[slotIdx]=null;
        kukisRenderHand();kukisRenderSlots();
    }

    // --- KUKIS INVESTIGATE ---
    function kukisInvestigate(){
        const placed=KS.clues.filter(Boolean);
        const res=document.getElementById('kukisResult');
        const combat=document.getElementById('kukisCombat');
        if(placed.length<3){if(res)res.innerHTML='<span style="color:var(--red)">🔍 Necesitas colocar 3 pistas</span>';return}
        if(STATE.balance<50){if(res)res.innerHTML='<span style="color:var(--red)">❌ Necesitas 50 chips para investigar</span>';return}

        sfx.spin();
        updateBal(-50);addWager(50);

        const totalPower=placed.reduce((s,c)=>s+c.power,0);
        const cas=KS.currentCase;
        const diff=cas.difficulty;
        const needed=diff*3;

        // Synergy bonus: 1 Personaje + 1 Objeto + 1 Evento = +3
        const hasP=placed.some(c=>c.type==='Personaje');
        const hasO=placed.some(c=>c.type==='Objeto');
        const hasE=placed.some(c=>c.type==='Evento');
        const synergy=(hasP&&hasO&&hasE)?3:0;
        const finalPower=totalPower+synergy;

        let synergyMsg=synergy>0?'<br>🌟 ¡SINERGIA ACTIVADA! (+3 poder)':'';

        if(finalPower>=needed){
            // CASE SOLVED!
            const reward=cas.reward;
            updateBal(reward);
            KS.casesResolved++;
            sfx.jackpot();
            if(res)res.innerHTML=`<span style="color:var(--gold)">🎉 ¡CASO RESUELTO! +${reward} chips${synergyMsg}</span>`;
            if(combat)combat.innerHTML=`<span style="color:var(--green)">🏆 ¡${cas.villain} derrotado! Poder: ${finalPower} vs ${needed}</span>`;
            toast(`🍪 Caso resuelto! +${reward} chips`);
            kukisWinFX();
        } else {
            // COMBAT - probability based
            if(combat)combat.innerHTML=`<span style="color:var(--orange)">⚔️ ¡COMBATE! Poder ${finalPower} vs Dificultad ${needed}${synergyMsg}</span>`;
            kukisCombat(finalPower,needed,cas);
        }
        kukisRenderCase();
    }

    function kukisCombat(playerPow,needed,cas){
        const res=document.getElementById('kukisResult');
        const combat=document.getElementById('kukisCombat');
        // Probability: higher power = better chance
        const ratio=playerPow/needed;
        const winChance=Math.min(ratio*0.6,0.85); // Max 85% chance
        const roll=Math.random();

        setTimeout(()=>{
            if(roll<winChance){
                // Combat win - reduced reward
                const reward=Math.floor(cas.reward*0.6);
                updateBal(reward);
                KS.casesResolved++;
                sfx.win();
                if(res)res.innerHTML=`<span style="color:var(--green)">⚔️ ¡Victoria en combate! +${reward} chips</span>`;
                if(combat)combat.innerHTML=`<span style="color:var(--green)">🏆 ${cas.villain} derrotado por combate (${Math.floor(winChance*100)}% prob)</span>`;
                toast(`⚔️ Combate ganado! +${reward} chips`);
                kukisWinFX();
            } else {
                // Combat loss
                sfx.lose();
                if(res)res.innerHTML=`<span style="color:var(--red)">💔 Derrota... ${cas.villain} escapó</span>`;
                if(combat)combat.innerHTML=`<span style="color:var(--red)">😢 Poder insuficiente. Prob: ${Math.floor(winChance*100)}% — Mala suerte</span>`;
                toast('💔 Caso perdido...');
            }
            kukisRenderCase();
        },800);
    }

    function kukisWinFX(){
        const emojis=['🍪','🍫','🍬','🍭','🦄','🌈','⭐','💎','🎉','✨'];
        for(let i=0;i<20;i++){
            const p=document.createElement('span');
            p.textContent=emojis[Math.floor(Math.random()*emojis.length)];
            p.style.cssText=`position:fixed;font-size:${20+Math.random()*35}px;left:${20+Math.random()*60}%;top:${20+Math.random()*50}%;pointer-events:none;z-index:9999;animation:cookieFly ${1+Math.random()*1.5}s ease-out forwards;`;
            document.body.appendChild(p);
            setTimeout(()=>p.remove(),2500);
        }
    }

    // --- KUKIS UNICORN POWER ---
    function kukisUnicorn(){
        if(KS.unicornCharges<=0){toast('🦄 Sin cargas. Resuelve casos para recargar.');return}
        sfx.win();
        KS.unicornCharges--;
        // Draw 2 extra cards
        const shuffled=[...ALL_KUKIS_CARDS].sort(()=>Math.random()-.5);
        const extra=shuffled.slice(0,2).map((c,i)=>({...c,uid:c.id+'_uni_'+Date.now()+'_'+i}));
        KS.hand.push(...extra);
        kukisRenderHand();
        kukisRenderCase();
        toast('🦄 ¡Poder Unicornio! +2 cartas');
        const res=document.getElementById('kukisResult');
        if(res)res.innerHTML='<span style="color:var(--purple)">🦄 ¡Poder Unicornio activado! +2 cartas extra</span>';
    }

    // === INIT ===
    function init(){
        new ParticleBG();
        renderGrid();
        updatePrestige();
        document.getElementById('balDisplay').textContent=STATE.balance.toLocaleString();
        document.addEventListener('click',()=>sfx.init(),{once:true});
        // Add cookieFly animation
        const st=document.createElement('style');
        st.textContent='@keyframes cookieFly{0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}100%{opacity:0;transform:translateY(-250px) rotate(720deg) scale(.3)}}';
        document.head.appendChild(st);
        console.log('🦁 C8L CASINO initialized — Domain: c8lcasino.ai');
        console.log('🎮 6 Games: Crash, Mines, Plinko, Ruleta, Slot, KUKIS');
        console.log('🍪 KUKIS: 24 cards, 8 cases, synergy system, combat, unicorn power');
    }
    init();
    </script>
